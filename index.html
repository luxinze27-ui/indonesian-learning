<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Learn Indonesian App</title>

<style>
body { font-family: Arial; margin:0; background:#f5f7fa; }
header { background:#4CAF50; color:white; text-align:center; padding:15px; }
.container { padding:15px; }

/* 首頁 */
.category-card {
  background:white;
  padding:20px;
  border-radius:12px;
  margin-bottom:10px;
  text-align:center;
  font-size:18px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

/* 單字卡 */
.card-container {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
.card {
  background:white;
  padding:20px;
  border-radius:12px;
  text-align:center;
}
.english { display:none; }

/* Quiz */
#qtext {
  font-size:28px;
  font-weight:bold;
  text-align:center;
  margin:20px 0;
}

.options button {
  width:100%;
  margin:12px 0;
  padding:18px;
  font-size:18px;
  border:none;
  border-radius:14px;
  background:#2196F3;
  color:white;
  font-weight:bold;
  box-shadow:0 3px 8px rgba(0,0,0,0.15);
}
.options button:active { transform:scale(0.97); }

.correct { background:#4CAF50 !important; }
.wrong { background:#f44336 !important; }

.next {
  width:100%;
  padding:16px;
  margin-top:15px;
  background:#333;
  color:white;
  border:none;
  border-radius:12px;
  display:none;
}

/* Review */
.review-card {
  background:white;
  padding:16px;
  border-radius:14px;
  margin-bottom:12px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}
.review-ind { font-size:22px; font-weight:bold; }
.review-eng { color:#666; }

.review-sen {
  margin-top:10px;
  padding:10px;
  background:#f0f4f8;
  border-radius:10px;
  cursor:pointer;
}

.translation { display:none; margin-top:8px; }

.reset-btn {
  width:100%;
  margin-bottom:12px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#f44336;
  color:white;
  font-weight:bold;
}

/* tab */
.tabbar {
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:white;
  border-top:1px solid #ddd;
}
.tabbar button { flex:1; padding:12px; border:none; }

.app { display:none; }
</style>
</head>

<body>

<header>🌤️ Learn Indonesian</header>

<div class="container">

<div id="home">
  <div class="category-card" onclick="enterCategory('weather')">🌤️ Weather</div>
  <div class="category-card" onclick="enterCategory('food')">🍽️ Food</div>
</div>

<div id="app" class="app">
  <button onclick="goHome()">⬅ Back</button>

  <div id="cards" class="card-container"></div>

  <div id="quiz">
    <div id="qtext"></div>
    <div id="options" class="options"></div>
    <button id="nextBtn" class="next" onclick="nextQ()">Next</button>
  </div>

  <div id="review"></div>
</div>

</div>

<div class="tabbar" id="tabbar" style="display:none;">
  <button onclick="showTab('cards')">📚</button>
  <button onclick="startQuiz()">🧠</button>
  <button onclick="showTab('review')">🔁</button>
</div>

<script>

// 🔥 完整20單字
const data = {
weather: [
{ind:"cuaca",eng:"weather",sen:"Cuaca hari ini bagus.",trans:"The weather is good today."},
{ind:"panas",eng:"hot",sen:"Hari ini sangat panas.",trans:"Today is very hot."},
{ind:"dingin",eng:"cold",sen:"Udara pagi ini dingin.",trans:"The morning air is cold."},
{ind:"hangat",eng:"warm",sen:"Air ini hangat.",trans:"This water is warm."},
{ind:"sejuk",eng:"cool",sen:"Udara di sini sejuk.",trans:"The air here is cool."},
{ind:"hujan",eng:"rain",sen:"Sekarang hujan.",trans:"It is raining now."},
{ind:"hujan deras",eng:"heavy rain",sen:"Tadi malam hujan deras.",trans:"It rained heavily last night."},
{ind:"gerimis",eng:"drizzle",sen:"Di luar sedang gerimis.",trans:"It is drizzling outside."},
{ind:"cerah",eng:"sunny",sen:"Hari ini cerah.",trans:"Today is sunny."},
{ind:"berawan",eng:"cloudy",sen:"Langit terlihat berawan.",trans:"The sky looks cloudy."},
{ind:"mendung",eng:"overcast",sen:"Cuaca hari ini mendung.",trans:"The weather is overcast today."},
{ind:"angin",eng:"wind",sen:"Angin bertiup kencang.",trans:"The wind is blowing strongly."},
{ind:"berangin",eng:"windy",sen:"Hari ini sangat berangin.",trans:"Today is very windy."},
{ind:"badai",eng:"storm",sen:"Badai akan datang.",trans:"A storm is coming."},
{ind:"petir",eng:"lightning",sen:"Petir menyambar.",trans:"Lightning strikes."},
{ind:"guntur",eng:"thunder",sen:"Saya mendengar guntur.",trans:"I hear thunder."},
{ind:"lembap",eng:"humid",sen:"Udara sangat lembap.",trans:"The air is very humid."},
{ind:"kering",eng:"dry",sen:"Musim ini sangat kering.",trans:"This season is very dry."},
{ind:"musim hujan",eng:"rainy season",sen:"Sekarang musim hujan.",trans:"It is the rainy season."},
{ind:"musim kemarau",eng:"dry season",sen:"Musim kemarau panas.",trans:"The dry season is hot."}
],

food: [
{ind:"makan",eng:"eat",sen:"Saya mau makan.",trans:"I want to eat."},
{ind:"minum",eng:"drink",sen:"Saya mau minum.",trans:"I want to drink."},
{ind:"menu",eng:"menu",sen:"Boleh lihat menu?",trans:"Can I see the menu?"},
{ind:"air",eng:"water",sen:"Saya pesan air.",trans:"I order water."},
{ind:"teh",eng:"tea",sen:"Saya minum teh.",trans:"I drink tea."},
{ind:"kopi",eng:"coffee",sen:"Saya suka kopi.",trans:"I like coffee."},
{ind:"nasi",eng:"rice",sen:"Saya makan nasi.",trans:"I eat rice."},
{ind:"nasi goreng",eng:"fried rice",sen:"Saya pesan nasi goreng.",trans:"I order fried rice."},
{ind:"mie",eng:"noodles",sen:"Saya makan mie.",trans:"I eat noodles."},
{ind:"ayam",eng:"chicken",sen:"Ayam ini enak.",trans:"This chicken is delicious."},
{ind:"daging",eng:"meat",sen:"Saya makan daging.",trans:"I eat meat."},
{ind:"ikan",eng:"fish",sen:"Saya pesan ikan.",trans:"I order fish."},
{ind:"sayur",eng:"vegetable",sen:"Saya makan sayur.",trans:"I eat vegetables."},
{ind:"pedas",eng:"spicy",sen:"Makanan ini pedas.",trans:"This food is spicy."},
{ind:"manis",eng:"sweet",sen:"Minuman ini manis.",trans:"This drink is sweet."},
{ind:"asin",eng:"salty",sen:"Makanan ini asin.",trans:"This food is salty."},
{ind:"enak",eng:"delicious",sen:"Makanan ini enak.",trans:"This food is delicious."},
{ind:"pesan",eng:"order",sen:"Saya pesan makanan.",trans:"I order food."},
{ind:"bayar",eng:"pay",sen:"Saya mau bayar.",trans:"I want to pay."},
{ind:"tagihan",eng:"bill",sen:"Minta tagihan.",trans:"Ask for the bill."}
]
};

let progress = JSON.parse(localStorage.getItem('progress')) || {
weather:{wrong:[]}, food:{wrong:[]}
};

function saveProgress(){
localStorage.setItem('progress', JSON.stringify(progress));
}

let currentCategory=null;
let vocab=[];
let list=[],i=0,current;

function enterCategory(cat){
currentCategory=cat;
vocab=data[cat];
home.style.display='none';
app.style.display='block';
tabbar.style.display='flex';
renderCards();
showTab('cards');
}

function goHome(){
home.style.display='block';
app.style.display='none';
tabbar.style.display='none';
}

function renderCards(){
cards.innerHTML='';
vocab.forEach(w=>{
let c=document.createElement('div');
c.className='card';
c.innerHTML=`${w.ind}<div class="english">${w.eng}</div>`;
c.onclick=()=>{
let e=c.querySelector('.english');
e.style.display=e.style.display==='block'?'none':'block';
};
cards.appendChild(c);
});
}

function showTab(tab){
cards.style.display=tab==='cards'?'grid':'none';
quiz.style.display=tab==='quiz'?'block':'none';
review.style.display=tab==='review'?'block':'none';
if(tab==='review') showReview();
}

function startQuiz(){
showTab('quiz');
list=[...vocab].sort(()=>Math.random()-0.5);
i=0;
nextQ();
}

function nextQ(){
if(i>=list.length){ showReview(); return; }

current=list[i];
qtext.textContent=current.ind;

let opts=[current.eng];
while(opts.length<3){
let r=vocab[Math.floor(Math.random()*vocab.length)].eng;
if(!opts.includes(r)) opts.push(r);
}

opts.sort(()=>Math.random()-0.5);
options.innerHTML='';
nextBtn.style.display='none';

opts.forEach(o=>{
let b=document.createElement('button');
b.textContent=o;

b.onclick=()=>{
document.querySelectorAll('#options button').forEach(x=>x.disabled=true);

if(o===current.eng){
b.classList.add('correct');
}else{
b.classList.add('wrong');

if(!progress[currentCategory].wrong.some(w=>w.ind===current.ind)){
progress[currentCategory].wrong.push(current);
saveProgress();
}

document.querySelectorAll('#options button').forEach(x=>{
if(x.textContent===current.eng) x.classList.add('correct');
});
}

i++;
nextBtn.style.display='block';
};

options.appendChild(b);
});
}

function showReview(){
const wrongList = progress[currentCategory].wrong;

if(wrongList.length===0){
review.innerHTML='🎉 No mistakes!';
return;
}

review.innerHTML = `
<button class="reset-btn" onclick="resetWrong()">🗑 Reset Wrong Words</button>
` + wrongList.map((w,idx)=>`
<div class="review-card">
<div class="review-ind">${w.ind}</div>
<div class="review-eng">${w.eng}</div>
<div class="review-sen" onclick="toggle(${idx})">
${w.sen}<br>🔊 點我播放
</div>
<div id="t${idx}" class="translation">${w.trans}</div>
</div>
`).join('');
}

function resetWrong(){
progress[currentCategory].wrong=[];
saveProgress();
showReview();
}

function toggle(i){
let el=document.getElementById('t'+i);
el.style.display = el.style.display==='block'?'none':'block';

let text = el.previousElementSibling.firstChild.textContent.trim();
let u=new SpeechSynthesisUtterance(text);
u.lang='id-ID';
speechSynthesis.speak(u);
}

</script>

</body>
</html>
